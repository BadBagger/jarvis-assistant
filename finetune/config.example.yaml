# Copy this file to config.yaml and adjust before running train.py.
# config.yaml is gitignored -- it's yours, not a shared default.

# Any compatible instruct model on Hugging Face can work. Qwen2.5 is a solid
# default: no access request needed and it has a normal chat template. Drop to
# Qwen/Qwen2.5-3B-Instruct if you have less than about 12GB VRAM.
base_model: "Qwen/Qwen2.5-7B-Instruct"
output_dir: "./output/jarvis-lora"

data:
  # Produced by prepare_data.py from your raw conversations file -- see
  # dataset.schema.json and data/example_conversations.jsonl for the expected
  # input format.
  train_file: "./data/train.jsonl"
  val_file: "./data/val.jsonl" # optional; leave empty ("") to skip validation
  # Start at 1024-2048. Longer examples cost much more VRAM and should be used
  # only when your target behavior really depends on long context.
  max_seq_length: 2048

lora:
  # r=8 or 16 is a good first pass for style/task tuning. Try 32 only after
  # you have enough cleaned data and evals to justify the extra capacity. The
  # guardrail checker rejects ranks above 64 for local prep.
  r: 16
  # alpha is commonly 2x r. Keep it between r and 4*r unless you are testing a
  # specific training recipe.
  alpha: 32
  # Small dropout helps reduce overfit on small personal datasets. Use
  # 0.03-0.1 before experimenting outside that range.
  dropout: 0.05
  # These module names fit Qwen-style architectures. For another model family,
  # inspect the model modules and update this list before training.
  target_modules: ["q_proj", "k_proj", "v_proj", "o_proj", "gate_proj", "up_proj", "down_proj"]

training:
  # One to three epochs is usually enough for a first local LoRA run. More
  # epochs can overfit quickly if the dataset is small or repetitive. The
  # guardrail checker fails above 5 epochs.
  num_train_epochs: 3
  per_device_train_batch_size: 1
  # Effective batch size is per_device_train_batch_size * gradient_accumulation_steps.
  # Increase accumulation instead of batch size when VRAM is tight.
  gradient_accumulation_steps: 8
  learning_rate: 2.0e-4
  warmup_ratio: 0.03
  logging_steps: 10
  save_steps: 100
  bf16: true # set false + fp16: true if your GPU does not support bf16
  fp16: false

quantization:
  # QLoRA. Keep true for most local Windows/NVIDIA workflows.
  load_in_4bit: true
